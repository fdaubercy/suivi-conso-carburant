<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Suivi E85">
  <title>Suivi Conso E85</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <span style="font-size:22px">⛽</span>
  <div class="header-title">
    <h1>Saisie d'un plein</h1>
    <span id="appVersion" class="version-tag"></span>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Changer de thème">🌙</button>
  <div class="header-right">
    <span class="badge" id="headerBadge">🌿 E85</span>
  </div>
</header>

<div class="card">

  <!-- Véhicule -->
  <p class="section-title">Véhicule</p>
  <div class="field">
    <select id="vehiculeSel" onchange="onVehiculeChange()">
      <option value="">— Choisir un véhicule —</option>
      <optgroup label="Mes véhicules" id="vehiculeGroup">
        <option value="__ajouter">＋ Ajouter un véhicule</option>
        <option value="__supprimer">✕ Supprimer ce véhicule</option>
      </optgroup>
    </select>
    <div class="geo-status" id="vehiculeStatus"></div>
    <div id="vehiculeAddField" class="hidden">
      <div class="cp-row" style="margin-top:8px">
        <input type="text" id="fNouveauVehicule" class="cp-input"
               placeholder="Ex : Moto Honda CBR600" autocomplete="off"
               onkeydown="if(event.key==='Enter') confirmerAjoutVehicule()">
        <button class="cp-btn" onclick="confirmerAjoutVehicule()">Ajouter</button>
      </div>
    </div>
  </div>

  <!-- Type de carburant — toggle dynamique (construit par _buildTypeToggle) -->
  <p class="section-title" style="margin-top:14px">Type de carburant</p>
  <div id="typeToggle"></div>
  <div class="renta-badge hidden" id="rentaBadge"></div>

  <!-- Indicateur rentabilité E85 vs SP98 (affiché si les 2 prix sont connus) -->
  <div class="rentabilite" id="rentabilite"></div>

  <p class="section-title">Informations du plein</p>
  <div class="row2">
    <div class="field">
      <label for="fDate">Date</label>
      <input type="date" id="fDate">
    </div>
    <div class="field">
      <label for="fKm">Km compteur</label>
      <input type="number" id="fKm" placeholder="11 596" inputmode="numeric" oninput="onKmInput()">
      <div class="km-warn" id="kmWarn"></div>
    </div>
  </div>
  <div class="row2">
    <div class="field">
      <label for="fLitres">Litres</label>
      <input type="number" id="fLitres" step="0.01" placeholder="14.90" inputmode="decimal" oninput="updateCout()">
    </div>
    <div class="field">
      <label id="prixLabel" for="fPrix">Prix E85 (€/L)</label>
      <input type="number" id="fPrix" step="0.001" placeholder="0.798" inputmode="decimal" oninput="updateCout()">
    </div>
  </div>

  <!-- Statut prix récupérés + recherche code postal (tous carburants) -->
  <div class="s98-status" id="s98Status"></div>
  <div class="cp-row hidden" id="cpSearch">
    <input type="text" id="fCp" class="cp-input" placeholder="Code postal (ex. 69620)"
           inputmode="numeric" maxlength="5" onkeydown="if(event.key==='Enter') fetchPricesByCP()">
    <button class="cp-btn" onclick="fetchPricesByCP()">Chercher</button>
  </div>

  <div class="cout-box" id="coutBox">
    <span class="cout-label">Coût du plein :</span>
    <span class="cout-val" id="coutVal">—</span>
  </div>
</div>

<!-- ─── Station essence ─── -->
<div class="card">
  <p class="section-title">Station essence</p>

  <div class="field">
    <label for="stationSel">Station</label>
    <div class="station-wrap">
      <select id="stationSel" onchange="onStationChange()">
        <option value="">— Choisir —</option>
        <optgroup label="Stations habituelles" id="knownGroup">
          <option value="__autre">+ Saisie manuelle</option>
        </optgroup>
      </select>
      <button class="geo-btn" id="geoBtn" onclick="geolocate()">📍</button>
    </div>
    <div class="geo-status info" id="geoStatus"></div>
  </div>

  <!-- Saisie manuelle + sélecteur de rayon -->
  <div class="field hidden" id="autreField">
    <label for="fAutre">Ville de la station</label>
    <input type="text" id="fAutre"
           placeholder="ex. Villefranche, Mâcon, Douai…"
           autocomplete="off" autocorrect="off" spellcheck="false"
           oninput="onAutreInput()">
    <div class="radius-row">
      <span class="radius-label">Rayon autour de la ville :</span>
      <button class="radius-btn active" data-m="20000"  onclick="setRadius(this, 20000)">20 km</button>
      <button class="radius-btn"        data-m="50000"  onclick="setRadius(this, 50000)">50 km</button>
      <button class="radius-btn"        data-m="100000" onclick="setRadius(this, 100000)">100 km</button>
      <button class="radius-btn"        data-m="null"   onclick="setRadius(this, null)">Ville seule</button>
    </div>
    <div class="s98-status" id="autreStatus"></div>
  </div>

  <div class="nearby-list" id="nearbyList"></div>

  <div id="stationMapWrap" class="hidden">
    <div class="map-header">
      <span class="map-title">🗺️ Carte des stations</span>
      <button class="map-close-btn" onclick="hideMap()">✕</button>
    </div>
    <div id="stationMap"></div>
  </div>
</div>

<!-- ─── Stats live (W7) ─── -->
<div class="card stats-card">
  <p class="section-title">Statistiques</p>
  <div id="statsBox"><div class="stats-msg">Chargement…</div></div>
</div>

<!-- ─── Historique 5 derniers pleins ─── -->
<div class="card hist-card">
  <div class="hist-header">
    <p class="section-title" style="margin-bottom:0">5 derniers pleins</p>
    <div class="hist-actions">
      <button class="hist-btn" onclick="dupliquerDernier()" title="Dupliquer le dernier plein dans le formulaire">📋</button>
      <button class="hist-btn hist-refresh" onclick="chargerHistorique()" title="Actualiser">↻</button>
    </div>
  </div>
  <div id="historiqueList"><div class="hist-msg">Chargement…</div></div>
</div>

<div class="feedback" id="feedback"></div>

<div class="submit-wrap">
  <button class="submit-btn" id="submitBtn" onclick="submitForm()">
    <span id="submitIcon">✓</span>
    <span id="submitText">Enregistrer le plein</span>
  </button>
</div>

<footer>Données enregistrées dans Google Sheets · Suivi Conso E85</footer>
<script type="module" src="js/main.js"></script>
</body>
</html>
