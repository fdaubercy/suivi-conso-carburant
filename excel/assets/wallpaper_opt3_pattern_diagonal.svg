<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <pattern id="vehiclePattern" x="0" y="0" width="180" height="130" patternUnits="userSpaceOnUse"
             patternTransform="rotate(-18)">
      <!-- Mini moto -->
      <g opacity="0.14" fill="#6B95B5">
        <circle cx="22" cy="62" r="16" fill="none" stroke="#6B95B5" stroke-width="3.5"/>
        <circle cx="72" cy="62" r="14" fill="none" stroke="#6B95B5" stroke-width="3.5"/>
        <path d="M22,62 L34,34 L54,36 L62,44 L66,52 L72,62" fill="none" stroke="#6B95B5" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M34,30 Q44,23 55,25 Q62,27 64,33 L56,36 Q48,38 40,37 Q34,36 34,33 Z"/>
        <line x1="66" y1="44" x2="60" y2="35" stroke="#6B95B5" stroke-width="2"/>
        <ellipse cx="53" cy="24" rx="7" ry="7"/>
        <path d="M47,31 Q50,25 58,23 Q62,29 60,42 L50,43 Z"/>
      </g>
      <!-- Mini voiture (décalée) -->
      <g opacity="0.10" fill="#6B95B5" transform="translate(95,40)">
        <path d="M0,45 L0,28 Q2,18 14,12 L40,7 Q56,5 68,12 L75,28 L75,45 Z"/>
        <path d="M10,28 Q15,10 34,5 L55,4 Q66,6 72,18 L74,28 Z" fill="white" opacity="0.3"/>
        <circle cx="15" cy="46" r="9" fill="none" stroke="#6B95B5" stroke-width="3"/>
        <circle cx="60" cy="46" r="9" fill="none" stroke="#6B95B5" stroke-width="3"/>
      </g>
    </pattern>
  </defs>
  <rect width="900" height="500" fill="white"/>
  <rect width="900" height="500" fill="url(#vehiclePattern)"/>
  <!-- Vignettage léger sur les bords pour un effet "fond" -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="white" stop-opacity="0"/>
    <stop offset="100%" stop-color="white" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="900" height="500" fill="url(#vignette)"/>
  <text x="450" y="480" text-anchor="middle" font-family="Calibri,sans-serif" font-size="11"
        fill="#9AAFC0" opacity="0.22" letter-spacing="4">SUIVI CONSO CARBURANTS</text>
</svg>