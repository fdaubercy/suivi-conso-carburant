version: 2
updates:
  # ── npm : Tesseract.js, Vite, Vitest et toutes les dépendances JS ──
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Paris
    labels:
      - dependencies
    open-pull-requests-limit: 5

  # ── GitHub Actions : actions/checkout, actions/setup-node, etc. ──
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
