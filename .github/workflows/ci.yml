name: CI — Lint, Tests & Version Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # ────────────────────────────────────────
  #  ESLint — qualite du code JS
  # ────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ────────────────────────────────────────
  #  Tests unitaires Vitest (W14)
  # ────────────────────────────────────────
  test:
    name: Tests Vitest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ────────────────────────────────────────
  #  Couverture de code Vitest (W72)
  #  Genere le rapport @vitest/coverage-v8 et
  #  publie le resume dans le recap du job.
  #  Non-bloquant (continue-on-error) — aucun
  #  seuil, sert d'indicateur de tendance.
  # ────────────────────────────────────────
  coverage:
    name: Couverture Vitest
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run coverage
        run: npm run test:coverage 2>&1 | tee coverage-output.txt

      - name: Resume de couverture dans le job
        if: always()
        run: |
          {
            echo "## 📊 Couverture de code (Vitest · @vitest/coverage-v8)"
            echo '```'
            grep -E '^(Statements|Branches|Functions|Lines)\s+:' coverage-output.txt || echo "(resume indisponible — voir le log du job)"
            echo '```'
            echo "_Indicateur non-bloquant — aucun seuil impose._"
          } >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────
  #  Audit des dépendances npm (S9)
  #  Signale les vulnérabilités moderate+
  #  Non-bloquant (continue-on-error: true)
  # ────────────────────────────────────────
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # ────────────────────────────────────────
  #  Audit accessibilite (W79 + W81)
  #  axe-core via Playwright sur saisie/stats/
  #  historique. BLOQUANT depuis W81 (app a zero
  #  violation grave) : une violation critical/
  #  serious fait echouer le job. Une instabilite
  #  de navigation reste toleree (skip cote test).
  # ────────────────────────────────────────
  a11y:
    name: Audit a11y (axe-core)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Audit accessibilite (bloquant sur violations graves)
        run: |
          set -o pipefail
          npm run test:a11y 2>&1 | tee a11y-output.txt

      - name: Resume a11y dans le job
        if: always()
        run: |
          {
            echo "## ♿ Audit accessibilite (axe-core · WCAG 2.0/2.1 A & AA)"
            echo '```'
            grep -E '\[a11y:' a11y-output.txt || echo "(resume indisponible — voir le log du job)"
            echo '```'
            echo "_Gate bloquant (W81) — 0 violation grave exigee sur saisie/stats/historique._"
          } >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────
  #  Verification coherence APP_VERSION
  #  Compare js/config.js vs dernier tag Git
  #  (avertissement seulement, ne bloque pas)
  # ────────────────────────────────────────
  version-check:
    name: APP_VERSION coherente
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0        # historique complet pour les tags

      - name: Verifier APP_VERSION vs dernier tag Git
        run: |
          # Extraire APP_VERSION depuis js/config.js
          APP_VERSION=$(grep -oP "APP_VERSION\s*=\s*'\K[^']+" js/config.js)
          echo "APP_VERSION dans config.js : $APP_VERSION"

          # Dernier tag Git (format vX.Y.Z.W ou X.Y.Z.W)
          LAST_TAG=$(git tag --sort=-version:refname | head -n1)
          echo "Dernier tag Git : ${LAST_TAG:-<aucun tag>}"

          if [ -z "$LAST_TAG" ]; then
            echo "ℹ️  Aucun tag git existant — APP_VERSION : $APP_VERSION"
            exit 0
          fi

          # Enleve le prefixe "v" si present
          TAG_VERSION="${LAST_TAG#v}"

          if [ "$APP_VERSION" = "$TAG_VERSION" ]; then
            echo "✅ Coherent : APP_VERSION ($APP_VERSION) == dernier tag ($LAST_TAG)"
          else
            echo "⚠️  APP_VERSION ($APP_VERSION) differe du dernier tag ($LAST_TAG)"
            echo "   → Si c'est voulu, pensez a creer : git tag v$APP_VERSION"
          fi
          # Ne fail pas : le developpement se fait souvent sans tag immediat
          exit 0
